    <!-- Service Worker "Kill Switch" -->
    <script>
      console.log("[BOOT] Phase 1: Cleaning legacy service workers...");
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            if (registrations.length === 0) console.log("[BOOT] No active service workers found.");
            for(let registration of registrations) {
              registration.unregister()
                .then(function(success) {
                  if (success) console.log("[BOOT] Legacy SW unregistered.");
                })
                .catch(function(err) {
                  console.warn("[BOOT] Failed to unregister SW:", err);
                });
            }
          }).catch(function(err) {
            console.warn("[BOOT] Failed to get SW registrations:", err);
          });
        }
      } catch (e) {
        console.error("[BOOT] SW lookup failed", e);
      }
      console.log("[BOOT] Phase 2: Loading main script...");
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
